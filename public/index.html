<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inteligência e Prospecção de Dados</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #00d4ff;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #00d4ff;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            font-size: 16px;
            background: #1a1a2e;
            color: #fff;
            transition: all 0.2s;
        }
        input::placeholder {
            color: #555;
        }
        input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #1a1a2e;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(0,212,255,0.3);
        }
        .btn-primary:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-copy {
            background: #28a745;
            color: white;
            margin-top: 15px;
        }
        .btn-copy:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(40,167,69,0.3);
        }
        .btn-copy.copied {
            background: #6c757d;
        }
        .result-section {
            display: none;
        }
        .result-section.active {
            display: block;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #0f3460;
        }
        .result-header h2 {
            font-size: 18px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .result-header h2::before {
            content: "✓";
            background: #28a745;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .result-box {
            background: #0d1b2a;
            border: 1px solid #1b3a4b;
            border-radius: 8px;
            padding: 25px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.7;
            max-height: 700px;
            overflow-y: auto;
            color: #e0e0e0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .result-box .report-title {
            color: #00d4ff;
            font-weight: bold;
            font-size: 14px;
        }
        .result-box .section-header {
            color: #ffd700;
            font-weight: bold;
            margin-top: 15px;
        }
        .result-box .subsection {
            color: #00d4ff;
        }
        .result-box .label {
            color: #888;
        }
        .result-box .value {
            color: #fff;
        }
        .result-box .separator {
            color: #333;
        }
        .loading {
            text-align: center;
            padding: 50px;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #0f3460;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        .loading p {
            font-size: 16px;
            color: #00d4ff;
            margin-bottom: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            color: #ff6b6b;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .error::before {
            content: "⚠";
            font-size: 18px;
        }
        .status-text {
            font-size: 13px;
            color: #666;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #0f3460;
        }
        .stat {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 8px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Scrollbar estilizada */
        .result-box::-webkit-scrollbar {
            width: 8px;
        }
        .result-box::-webkit-scrollbar-track {
            background: #0d1b2a;
            border-radius: 4px;
        }
        .result-box::-webkit-scrollbar-thumb {
            background: #1b3a4b;
            border-radius: 4px;
        }
        .result-box::-webkit-scrollbar-thumb:hover {
            background: #2a5a6b;
        }

        /* Highlight de sintaxe para o relatório */
        .highlight-title { color: #00d4ff; font-weight: bold; }
        .highlight-section { color: #ffd700; }
        .highlight-subsection { color: #00d4ff; }
        .highlight-label { color: #888; }
        .highlight-value { color: #fff; }
        .highlight-separator { color: #333; }
        .highlight-url { color: #4da6ff; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sistema de Inteligência e Prospecção</h1>
            <p class="subtitle">Análise completa de dados empresariais com IA</p>
        </div>

        <div class="card">
            <form id="form">
                <div class="form-group">
                    <label>CNPJ da Empresa</label>
                    <input type="text" id="cnpj" placeholder="00.000.000/0001-00" required>
                </div>
                <div class="form-group">
                    <label>Nome da Empresa (opcional)</label>
                    <input type="text" id="nome" placeholder="Ajuda a encontrar informações mais precisas">
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Gerar Relatório
                </button>
            </form>

            <div class="loading" id="loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p>Gerando relatório de inteligência...</p>
                <p class="status-text" id="statusText">Iniciando análise...</p>
            </div>

            <div class="error" id="error" style="display: none;"></div>
        </div>

        <div class="card result-section" id="resultSection">
            <div class="result-header">
                <h2>Relatório Gerado</h2>
            </div>
            <div class="result-box" id="resultBox"></div>
            <button class="btn btn-copy" id="copyBtn" onclick="copiarResultado()">
                Copiar Relatório Completo
            </button>
        </div>
    </div>

    <script>
        let rawText = '';

        // Mascara CNPJ
        document.getElementById('cnpj').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '').slice(0, 14);
            if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5');
            else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d+)$/, '$1.$2.$3/$4');
            else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d+)$/, '$1.$2.$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d+)$/, '$1.$2');
            e.target.value = v;
        });

        // Formata o relatório com syntax highlighting
        function formatReport(text) {
            // Escape HTML
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Highlight URLs
            html = html.replace(/(https?:\/\/[^\s\)]+)/g, '<a href="$1" target="_blank" class="highlight-url">$1</a>');

            // Highlight separadores
            html = html.replace(/(={10,})/g, '<span class="highlight-separator">$1</span>');
            html = html.replace(/(-{10,})/g, '<span class="highlight-separator">$1</span>');

            // Highlight títulos de seção (números seguidos de ponto e texto em maiúsculas)
            html = html.replace(/^(\d+\.\s+[A-ZÁÀÂÃÉÈÊÍÏÓÔÕÖÚÇ\s]+)$/gm, '<span class="highlight-section">$1</span>');

            // Highlight subseções (números tipo 1.1, 1.2, etc)
            html = html.replace(/^(\d+\.\d+\s+[A-ZÁÀÂÃÉÈÊÍÏÓÔÕÖÚÇ\s]+)$/gm, '<span class="highlight-subsection">$1</span>');

            // Highlight título principal
            html = html.replace(/(RELATÓRIO DE INTELIGÊNCIA E PROSPECÇÃO DE DADOS)/g, '<span class="highlight-title">$1</span>');

            // Highlight labels (texto seguido de dois pontos)
            html = html.replace(/^([A-Za-záàâãéèêíïóôõöúçÁÀÂÃÉÈÊÍÏÓÔÕÖÚÇ\s]+:)(\s*)/gm, '<span class="highlight-label">$1</span>$2');

            return html;
        }

        // Funcao para checar status da task
        async function checkTaskStatus(taskId) {
            const response = await fetch(`/api/status?id=${taskId}`);
            return await response.json();
        }

        // Submit
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const cnpj = document.getElementById('cnpj').value.trim();
            const nome = document.getElementById('nome').value.trim();

            if (cnpj.replace(/\D/g, '').length !== 14) {
                alert('CNPJ deve ter 14 dígitos');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const statusText = document.getElementById('statusText');
            const error = document.getElementById('error');
            const resultSection = document.getElementById('resultSection');

            btn.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';
            resultSection.classList.remove('active');
            statusText.textContent = 'Iniciando análise...';

            try {
                // Criar task
                const createResponse = await fetch('/api/enriquecer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cnpj, nome })
                });

                const createData = await createResponse.json();

                if (!createResponse.ok) {
                    throw new Error(createData.error || 'Erro ao iniciar análise');
                }

                const taskId = createData.taskId;

                // Polling para checar status
                let attempts = 0;
                const maxAttempts = 180; // 15 minutos

                const messages = [
                    'Consultando bases oficiais...',
                    'Buscando dados cadastrais...',
                    'Analisando Receita Federal...',
                    'Verificando situação cadastral...',
                    'Coletando dados econômicos...',
                    'Pesquisando redes sociais...',
                    'Analisando presença digital...',
                    'Buscando informações de contato...',
                    'Identificando quadro societário...',
                    'Analisando segmento de atuação...',
                    'Calculando estimativas...',
                    'Gerando análise SWOT...',
                    'Compilando relatório...',
                    'Finalizando análise...'
                ];

                while (attempts < maxAttempts) {
                    await new Promise(r => setTimeout(r, 5000));
                    attempts++;

                    const msgIndex = Math.min(Math.floor(attempts / 4), messages.length - 1);
                    statusText.textContent = messages[msgIndex] + ` (${attempts * 5}s)`;

                    try {
                        const statusData = await checkTaskStatus(taskId);

                        if (statusData.status === 'completed') {
                            rawText = statusData.resultado;
                            document.getElementById('resultBox').innerHTML = formatReport(rawText);
                            resultSection.classList.add('active');
                            document.getElementById('copyBtn').textContent = 'Copiar Relatório Completo';
                            document.getElementById('copyBtn').classList.remove('copied');
                            loading.style.display = 'none';
                            btn.disabled = false;

                            resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            return;
                        }

                        if (statusData.status === 'failed') {
                            throw new Error(statusData.error || 'Falha na análise');
                        }
                    } catch (pollError) {
                        console.log('Tentando novamente...', pollError);
                    }
                }

                throw new Error('Timeout: a análise demorou demais');

            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'flex';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Copiar resultado
        function copiarResultado() {
            navigator.clipboard.writeText(rawText).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'Copiado!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copiar Relatório Completo';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
