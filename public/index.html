<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enriquecimento de CNPJ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 32px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            font-size: 16px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-copy {
            background: #28a745;
            color: white;
            margin-top: 15px;
        }
        .btn-copy:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(40,167,69,0.4);
        }
        .btn-copy.copied {
            background: #6c757d;
        }
        .result-section {
            display: none;
        }
        .result-section.active {
            display: block;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .result-header h2 {
            font-size: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .result-header h2::before {
            content: "✓";
            background: #28a745;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .result-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 25px;
            font-size: 14px;
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
            color: #333;
        }
        .result-box .section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e9ecef;
        }
        .result-box .section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .result-box .section-title {
            font-weight: 700;
            color: #667eea;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-box .section-title::before {
            content: "";
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        .result-box .field {
            display: flex;
            padding: 6px 0;
        }
        .result-box .field-label {
            font-weight: 600;
            color: #555;
            min-width: 180px;
            flex-shrink: 0;
        }
        .result-box .field-value {
            color: #333;
            word-break: break-word;
        }
        .result-box .field-value a {
            color: #667eea;
            text-decoration: none;
        }
        .result-box .field-value a:hover {
            text-decoration: underline;
        }
        .result-raw {
            display: none;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }
        .loading p {
            font-size: 16px;
            margin-bottom: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            color: #c53030;
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .error::before {
            content: "⚠";
            font-size: 18px;
        }
        .status-text {
            font-size: 14px;
            color: #888;
        }
        .toggle-view {
            font-size: 13px;
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
            margin-left: auto;
        }
        .toggle-view:hover {
            color: #764ba2;
        }

        /* Scrollbar estilizada */
        .result-box::-webkit-scrollbar {
            width: 8px;
        }
        .result-box::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .result-box::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
        .result-box::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Enriquecimento de CNPJ</h1>
        <p class="subtitle">Busca inteligente de dados empresariais com IA</p>

        <div class="card">
            <form id="form">
                <div class="form-group">
                    <label>CNPJ *</label>
                    <input type="text" id="cnpj" placeholder="00.000.000/0001-00" required>
                </div>
                <div class="form-group">
                    <label>Nome da Empresa (opcional - ajuda na busca)</label>
                    <input type="text" id="nome" placeholder="Ex: Magazine Luiza">
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Buscar Dados
                </button>
            </form>

            <div class="loading" id="loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p>Buscando dados oficiais...</p>
                <p class="status-text" id="statusText">Criando consulta...</p>
            </div>

            <div class="error" id="error" style="display: none;"></div>
        </div>

        <div class="card result-section" id="resultSection">
            <div class="result-header">
                <h2>Dados Encontrados</h2>
                <span class="toggle-view" onclick="toggleView()">Ver texto original</span>
            </div>
            <div class="result-box" id="resultBox"></div>
            <div class="result-raw" id="resultRaw"></div>
            <button class="btn btn-copy" id="copyBtn" onclick="copiarResultado()">
                Copiar para CRM
            </button>
        </div>
    </div>

    <script>
        let rawText = '';
        let showingRaw = false;

        // Mascara CNPJ
        document.getElementById('cnpj').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '').slice(0, 14);
            if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5');
            else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d+)$/, '$1.$2.$3/$4');
            else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d+)$/, '$1.$2.$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d+)$/, '$1.$2');
            e.target.value = v;
        });

        // Formata o resultado para exibição bonita
        function formatResult(text) {
            // Converte links em HTML
            const linkify = (str) => {
                return str.replace(/(https?:\/\/[^\s\)]+)/g, '<a href="$1" target="_blank">$1</a>');
            };

            // Remove marcações markdown
            let cleaned = text
                .replace(/\*\*/g, '')
                .replace(/\*/g, '')
                .replace(/###\s*/g, '')
                .replace(/##\s*/g, '')
                .replace(/#\s*/g, '')
                .replace(/\|/g, '')
                .replace(/---+/g, '')
                .replace(/:---/g, '');

            const lines = cleaned.split('\n').filter(l => l.trim());
            let html = '';
            let currentSection = '';
            let sectionContent = [];

            const sectionKeywords = [
                'DADOS CADASTRAIS', 'DADOS OFICIAIS', 'INFORMAÇÕES CADASTRAIS',
                'CONTATO', 'CONTATOS', 'DADOS DE CONTATO',
                'REDES SOCIAIS', 'PRESENÇA DIGITAL', 'MÍDIAS SOCIAIS',
                'DADOS COMPLEMENTARES', 'INFORMAÇÕES ADICIONAIS', 'OUTROS',
                'ENDEREÇO', 'LOCALIZAÇÃO',
                'SÓCIOS', 'QUADRO SOCIETÁRIO', 'SOCIETÁRIO'
            ];

            const isSection = (line) => {
                const upper = line.toUpperCase().trim();
                return sectionKeywords.some(k => upper.includes(k)) ||
                       (upper.length < 40 && upper === upper.toUpperCase() && !upper.includes(':'));
            };

            const flushSection = () => {
                if (sectionContent.length > 0) {
                    html += '<div class="section">';
                    if (currentSection) {
                        html += `<div class="section-title">${currentSection}</div>`;
                    }
                    sectionContent.forEach(line => {
                        const parts = line.split(':');
                        if (parts.length >= 2 && parts[0].trim().length < 50) {
                            const label = parts[0].trim();
                            const value = linkify(parts.slice(1).join(':').trim());
                            html += `<div class="field"><span class="field-label">${label}:</span><span class="field-value">${value}</span></div>`;
                        } else {
                            html += `<div class="field"><span class="field-value">${linkify(line)}</span></div>`;
                        }
                    });
                    html += '</div>';
                    sectionContent = [];
                }
            };

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;

                if (isSection(trimmed)) {
                    flushSection();
                    currentSection = trimmed.replace(/[:\-]/g, '').trim();
                } else {
                    sectionContent.push(trimmed);
                }
            });

            flushSection();

            return html || `<div class="section"><div class="field"><span class="field-value">${linkify(text.replace(/\n/g, '<br>'))}</span></div></div>`;
        }

        function toggleView() {
            const resultBox = document.getElementById('resultBox');
            const toggle = document.querySelector('.toggle-view');

            showingRaw = !showingRaw;

            if (showingRaw) {
                resultBox.innerHTML = `<pre style="white-space: pre-wrap; font-family: inherit; margin: 0;">${rawText}</pre>`;
                toggle.textContent = 'Ver formatado';
            } else {
                resultBox.innerHTML = formatResult(rawText);
                toggle.textContent = 'Ver texto original';
            }
        }

        // Funcao para checar status da task
        async function checkTaskStatus(taskId) {
            const response = await fetch(`/api/status?id=${taskId}`);
            return await response.json();
        }

        // Submit
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const cnpj = document.getElementById('cnpj').value.trim();
            const nome = document.getElementById('nome').value.trim();

            if (cnpj.replace(/\D/g, '').length !== 14) {
                alert('CNPJ deve ter 14 dígitos');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const statusText = document.getElementById('statusText');
            const error = document.getElementById('error');
            const resultSection = document.getElementById('resultSection');

            btn.disabled = true;
            loading.style.display = 'block';
            error.style.display = 'none';
            resultSection.classList.remove('active');
            statusText.textContent = 'Criando consulta...';
            showingRaw = false;

            try {
                // Criar task
                const createResponse = await fetch('/api/enriquecer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cnpj, nome })
                });

                const createData = await createResponse.json();

                if (!createResponse.ok) {
                    throw new Error(createData.error || 'Erro ao criar consulta');
                }

                const taskId = createData.taskId;
                statusText.textContent = 'Buscando em fontes oficiais...';

                // Polling para checar status
                let attempts = 0;
                const maxAttempts = 120;

                while (attempts < maxAttempts) {
                    await new Promise(r => setTimeout(r, 5000));
                    attempts++;

                    const messages = [
                        'Consultando Receita Federal...',
                        'Buscando dados cadastrais...',
                        'Verificando redes sociais...',
                        'Coletando informações de contato...',
                        'Processando dados...',
                        'Finalizando busca...'
                    ];
                    statusText.textContent = messages[Math.min(Math.floor(attempts / 3), messages.length - 1)] + ` (${attempts * 5}s)`;

                    try {
                        const statusData = await checkTaskStatus(taskId);

                        if (statusData.status === 'completed') {
                            rawText = statusData.resultado;
                            document.getElementById('resultBox').innerHTML = formatResult(rawText);
                            document.getElementById('resultRaw').textContent = rawText;
                            resultSection.classList.add('active');
                            document.getElementById('copyBtn').textContent = 'Copiar para CRM';
                            document.getElementById('copyBtn').classList.remove('copied');
                            document.querySelector('.toggle-view').textContent = 'Ver texto original';
                            loading.style.display = 'none';
                            btn.disabled = false;

                            // Scroll para o resultado
                            resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            return;
                        }

                        if (statusData.status === 'failed') {
                            throw new Error(statusData.error || 'Falha na busca');
                        }
                    } catch (pollError) {
                        console.log('Tentando novamente...', pollError);
                    }
                }

                throw new Error('Timeout: a busca demorou demais');

            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'flex';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Copiar resultado
        function copiarResultado() {
            navigator.clipboard.writeText(rawText).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'Copiado!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copiar para CRM';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
